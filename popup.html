<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByTheHour</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <h1>ByTheHour</h1>
      <p class="subtitle">Show LinkedIn jobs posted within the last:</p>

      <label for="maxHours">Hours</label>
      <div class="controls">
        <input id="maxHours" type="number" min="1" step="1" value="12">
        <button id="saveButton" type="button">Save</button>
      </div>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
